fading = false;              # disable fade-in/out
fade-delta = 0;              # speed of fade (0 = instant)
fade-in-step = 0;            # no step increment
fade-out-step = 0;

backend = "glx";             # or "xrender" if GLX has issues
blur-method = "kernel";
blur-size = 5;
corner-radius = 12;
round-borders = 1;
