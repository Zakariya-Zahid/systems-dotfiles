# ----------------------------
# Font
# ----------------------------
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16

# Improve text rendering
adjust_line_height  0
adjust_column_width 0


# ----------------------------
# Window Layout & Padding
# ----------------------------
window_padding_width 10
confirm_os_window_close 0


# ----------------------------
# Background & Transparency
# ----------------------------
background_opacity 0.8
dynamic_background_opacity no
# Slight blur (only works with compositor like picom)
# Comment out if it causes issues

background_blur 5


# ----------------------------
# Color Scheme (Muted / Professional)
# Inspired by Nord / Gruvbox hybrid
# ----------------------------
foreground            #d8dee9
background            #111
selection_foreground  #2e3440
selection_background  #88c0d0

cursor                #88c0d0
cursor_text_color     #2e3440

# Normal colors
color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #ebcb8b
color4  #81a1c1
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0

# Bright colors
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #ebcb8b
color12 #81a1c1
color13 #b48ead
color14 #8fbcbb
color15 #eceff4


# ----------------------------
# Behavior (No Surprises)
# ----------------------------
enable_audio_bell no
visual_bell_duration 0.0
remember_window_size yes
initial_window_width  900
initial_window_height 600


# ----------------------------
# Clipboard & Selection
# ----------------------------
copy_on_select no
strip_trailing_spaces smart


# ----------------------------
# Shell Integration
# ----------------------------
shell_integration enabled


# ----------------------------
# Performance
# ----------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes


# ----------------------------
# Tabs (Minimal, Optional)
# ----------------------------
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #eceff4
active_tab_background   #2e3440
inactive_tab_foreground #6b7280
inactive_tab_background #1e222a

