[bar/main]
width = 95%
height = 32
offset-x = 2.5%
offset-y = 2
padding-left = 0
padding-right = 2
radius = 12
override-redirect = true
background = #111
foreground = #ffffff
border-size = 0
border-color = #9d4edd
font-0 = JetBrainsMono Nerd Font:size=12
font-1 = Font Awesome 6 Free:style=Solid:size=10
font-2 = Font Awesome 6 Free:style=Regular:size=10
font-3 = Font Awesome 6 Brands:size=10

modules-left = i3 xwindow
modules-right = wifi netspeed battery-info volume cpu cputemp memory disk date
separator = " | "
separator-foreground = #9d4edd

enable-ipc = true

[module/i3]
type = internal/i3

format = <label-state>

label-focused = %name%
label-focused-background = ${colors.focused_bg}
label-focused-foreground = ${colors.focused_fg}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-background = ${colors.unfocused_bg}
label-unfocused-foreground = ${colors.unfocused_fg}
label-unfocused-padding = 2

label-visible = %name%
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.urgent_bg}
label-urgent-foreground = ${colors.urgent_fg}
label-urgent-padding = 2

[colors]
; Background of the bar (semi-transparent purple)
bg = #9d4edd        ; Polybar ignores alpha, transparency handled by picom
fg = #ffffff        ; main text color

; Workspace colors (aligned with your i3 colors)
focused_bg = #9d4edd
focused_fg = #ffffff
unfocused_bg = #2a2540
unfocused_fg = #e0aaff
urgent_bg = #ff6b6b
urgent_fg = #ffffff

; Optional indicator color
indicator = #9d4edd

[module/left-round]
type = custom/text
content = "%{T3}Óā∂%{T-}"
content-foreground = #111111
content-background = #00000000

[module/right-round]
type = custom/text
content = "%{T3}Óāī%{T-}"
content-foreground = #111111
content-background = #00000000

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %I:%M:%S %p
label = ÔĄ≥ %date% ÔÄó %time%

[module/wifi]
type = internal/network
interface = wlan0
interval = 5
label-connected = Ôáę  Wifi 

[module/battery-info]
type = custom/script
exec = ~/.config/polybar/battery_info.sh
interval = 10

#[module/battery]
#type = internal/battery
#battery = BAT0
#adapter = AC
#label-charging = ÔČÄ %percentage%%
#label-discharging = ÔČÄ %percentage%%

[module/volume]
type = internal/pulseaudio
label-volume = ÔÄ®  %percentage%%

[module/memory]
type = custom/script
exec = /home/zak/.config/polybar/ram_usage.sh
interval = 5

[module/disk]
type = custom/script
exec = /home/zak/.config/polybar/disk_usage.sh
interval = 10

[module/cpu]
type = custom/script
exec = /home/zak/.config/polybar/cpu_load.sh
interval = 1

#[module/weather]
#type = custom/script
#exec = /home/zak/.config/polybar/weather.sh
#interval = 900 

[module/cputemp]
type = custom/script
exec = /home/zak/.config/polybar/cpu_temp.sh
interval = 5

[module/netspeed]
type = custom/script
exec = /home/zak/.config/polybar/net_speed.sh
interval = 2
